BASIC:
  depends: []
  ppas:
    - ppa:teamviewer/teamviewer
    - ppa:getdeb/apps
    - ppa:webmin/release
    - ppa:syncthing/syncthing
  packages:
    - mc
    - trash-cli
    - snapd
    - git
    - screen
    - curl
    - htop
    - tmux
    - teamviewer
    - webmin
    - syncthing

WS:
  depends:
    - BASIC
  ppas:
    - ppa:dropbox/stable
    - ppa:otto-kesselgulasch/gimp
    - ppa:gnome3-team/gnome3
    - ppa:dhor/myway
    - ppa:bunkus/mkvtoolnix
    - ppa:ubuntuhandbook1/apps
    - ppa:wine/wine-builds
  packages:
    - firefox
    - vlc
    - dropbox
    - gimp
    - gnome-tweaks
    - gparted
    - lame
    - playonlinux
    - samba
    - synaptic
    - tilda
    - winetricks
    - wine-stable

ZEUS:
  depends:
    - WS
  ppas:
    - ppa:teamviewer/teamviewer
    - ppa:getdeb/apps
    - ppa:webmin/release
    - ppa:syncthing/syncthing
  packages:
    - adb
    - audacity
    - calibre
    - fastboot
    - fdupes
    - "forensics*"
    - "geany*"
    - gprename
    - masscan
    - picard
    - getdeb-apps
  snaps:
    - name: code
      channel: latest/stable
      classic: true
    - name: libation
    - name: snapd-desktop-integration
    - name: snap-store
    - name: ubuntu-mate-welcome
    - name: video-downloader
    - name: fslint
    - name: gpt-desktop

SERVER:
  depends:
    - BASIC
  ppas:
    - ppa:certbot/certbot
    - ppa:nginx/stable
