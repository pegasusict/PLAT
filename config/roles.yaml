  packages:
    - nginx
    - certbot
    - openssh-server

LXCHOST:
  depends:
    - SERVER
  ppas:
    - ppa:ubuntu-lxc/lxd-stable
  packages:
    - bridge-utils
    - lxc
    - lxcfs
    - lxd
    - lxd-tools
    - xfsprogs

BACKUPSERVER:
  depends:
    - SERVER
  packages:
    - borgbackup
    - rsnapshot

CONTAINER:
  depends:
    - BASIC

NAS:
  depends:
